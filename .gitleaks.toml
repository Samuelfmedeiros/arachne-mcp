title = "Portifolio Security Config"

[allowlist]
description = "Known safe patterns"
paths = ['''test/.*''', '''docs/.*''', '''node_modules/.*''']

[[rules]]
id = "audio-files"
description = "Audio transcription files should not be committed"
regex = '''audio_[a-f0-9]+\.(json|srt|tsv|txt|vtt|ogg|wav|mp3)$'''
tags = ["audio", "transcription"]

[[rules]]
id = "screenshots"
description = "Screenshots should not be in repos"
regex = '''(screenshot|print|captura|snapshot)\.(png|jpg|jpeg|gif)$'''
tags = ["media", "screenshot"]
